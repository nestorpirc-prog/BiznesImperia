<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Empire</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Business Empire</h1>
<p>Build your own financial empire</p>
</header>

<div class="container">

<div class="stats">
<h2 id="money">$0</h2>
<p>Income: <span id="income">$1</span>/sec</p>
</div>

<div class="buttons">

<button onclick="work()">Work</button>

<button onclick="buyBusiness('lemonade')">
Buy Lemonade Stand ($50)
</button>

<button onclick="buyBusiness('shop')">
Buy Shop ($250)
</button>

<button onclick="buyBusiness('company')">
Buy Company ($1000)
</button>

</div>

</div>

<footer>
<p>Business Empire Web Game</p>
</footer>

<script src="script.js"></script>
<script src="game/game.js"></script>

</body>
</html>
